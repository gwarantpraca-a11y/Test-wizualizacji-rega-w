<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wirtualny Regał — Philips</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ede6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.ui{display:flex;gap:8px;padding:12px;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap;position:sticky;top:0;z-index:10}
input{padding:9px 12px;border:1px solid #ccc;border-radius:8px;font-size:15px;width:160px;font-family:monospace;-webkit-appearance:none}
button{padding:9px 18px;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600}
.res{display:none;gap:12px;padding:12px 16px;background:#E3F2FD;border-bottom:1px solid #90CAF9;align-items:center}
.res.on{display:flex}
.rp{font-size:28px;font-weight:700;font-family:monospace;background:#fff;padding:5px 16px;border-radius:10px;border:2px solid #185FA5;color:#042C53}
.scene{padding:14px;overflow-x:auto}
.sign{text-align:center;padding:12px;font-size:19px;font-weight:700;letter-spacing:2px;color:#fff;margin:0 10px;border-radius:6px 6px 0 0;background:#0D5EAF}
.bodywrap{margin:0 10px;border:2px solid #999;border-top:none}
.row{display:flex;gap:3px;padding:4px 5px 0;background:#d4b06a;min-height:80px;align-items:flex-end}
.plank{height:11px;background:#8a6030;border-top:2px solid #eee;box-shadow:0 3px 5px rgba(0,0,0,.3)}
.floor{height:16px;background:#bbb;border-top:2px solid #aaa;margin:0 10px}
.prod{flex:1;min-width:46px;max-width:64px;cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:transform .15s}
.prod:hover{transform:translateY(-3px)}
.prod.on{transform:translateY(-10px);filter:drop-shadow(0 6px 14px rgba(255,200,0,.8))}
.prod.on .card{outline:3px solid gold;outline-offset:2px}
.card{width:100%;border-radius:5px;border:1px solid rgba(0,0,0,.15);overflow:hidden;background:#fff;box-shadow:1px 2px 4px rgba(0,0,0,.2)}
.svg-wrap{background:#fff;display:flex;align-items:center;justify-content:center;height:44px}
.info{padding:2px 3px 3px;background:#f8f8f8;border-top:1px solid #eee;text-align:center}
.bl{font-size:6.5px;font-weight:800;color:#0D5EAF}
.bd{font-size:5.5px;color:#666;line-height:1.25;margin-top:1px}
.bn{font-size:6.5px;color:#bbb;font-weight:700;margin-top:1px}
.ptag{height:6px;background:linear-gradient(to right,#FF5500,#FF8800);width:100%}
.rowlabel{font-size:11px;color:#888;padding:4px 8px;background:#fff;font-weight:500}
h1{font-size:18px;padding:14px 16px 0;color:#0C447C}
.mic-btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.mic-btn.listening{background:#C62828;color:#fff}
.mic-btn.stopped{background:#1565C0;color:#fff}
.heard{font-size:13px;color:#888;padding:0 16px 8px;font-family:monospace}
.dot{width:9px;height:9px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:5px;animation:blink 1.5s infinite}
.dot.off{background:#999;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<h1>Wirtualny Regał — Philips LED-Leuchtmittel</h1>
<div class="ui">
  <button class="mic-btn stopped" id="micBtn" onclick="toggleMic()">
    <span class="dot off" id="micDot"></span><span id="micLabel">Włącz mikrofon</span>
  </button>
  <input id="ean" placeholder="końcówka EAN..." maxlength="8" inputmode="numeric"/>
  <button onclick="search()">Szukaj</button>
</div>
<div class="heard">Słyszę: <span id="heardVal">—</span></div>
<div class="res" id="res">
  <div class="rp" id="rp">—</div>
  <div><div id="rn" style="font-weight:600;color:#0C447C;font-size:15px"></div><div id="re" style="font-size:12px;color:#185FA5;font-family:monospace"></div></div>
</div>
<div class="scene">
  <div class="sign">PHILIPS LED-LEUCHTMITTEL</div>
  <div class="bodywrap" id="body"></div>
  <div class="floor"></div>
</div>

function icon(d){
  if(d.indexOf('GU10')>=0||d.indexOf('MR16')>=0||d.indexOf('MR11')>=0||d.indexOf('GU4')>=0)
    return '<svg width="32" height="32" viewBox="0 0 44 44"><rect x="14" y="32" width="16" height="7" rx="2" fill="#bbb"/><rect x="15" y="26" width="5" height="7" rx="1" fill="#999"/><rect x="24" y="26" width="5" height="7" rx="1" fill="#999"/><ellipse cx="22" cy="16" rx="18" ry="13" fill="#eef6ff" stroke="#c8d8e8"/><rect x="17" y="10" width="10" height="7" rx="1" fill="#bde"/></svg>';
  if(d.indexOf('B35')>=0||d.indexOf('P45')>=0)
    return '<svg width="22" height="32" viewBox="0 0 44 72"><rect x="18" y="64" width="8" height="8" rx="1" fill="#c0c0c0"/><line x1="18" y1="67" x2="26" y2="67" stroke="#999" stroke-width="1"/><rect x="17" y="57" width="10" height="8" rx="1" fill="#ddd"/><path d="M11,55 Q10,30 22,18 Q34,30 33,55 Z" fill="#fff6e0" stroke="#f0d070"/><ellipse cx="18" cy="24" rx="3" ry="2" fill="rgba(255,255,255,.6)"/></svg>';
  if(d.indexOf('G9')>=0||d.indexOf('G4')>=0)
    return '<svg width="20" height="28" viewBox="0 0 44 60"><rect x="17" y="50" width="10" height="9" rx="1" fill="#ccc"/><circle cx="22" cy="32" r="14" fill="#fff6e0" stroke="#f0d070"/></svg>';
  if(d.indexOf('R39')>=0||d.indexOf('R50')>=0||d.indexOf('R63')>=0)
    return '<svg width="26" height="32" viewBox="0 0 44 60"><rect x="17" y="50" width="10" height="9" rx="1" fill="#ccc"/><path d="M12,45 L12,25 Q22,15 32,25 L32,45 Z" fill="#eef6ff" stroke="#c8d8e8"/></svg>';
  if(d.indexOf('ST64')>=0||d.indexOf('G95')>=0||d.indexOf('A67')>=0)
    return '<svg width="26" height="34" viewBox="0 0 44 68"><rect x="17" y="59" width="10" height="9" rx="1" fill="#c0c0c0"/><rect x="16" y="51" width="12" height="9" rx="1" fill="#ddd"/><circle cx="22" cy="33" r="18" fill="#fff6e0" stroke="#f0d070"/></svg>';

var ap=null;

function render(){
  var h='';
  for(var i=0;i<ROWS.length;i++){
    var r=ROWS[i];
    h+='<div class="rowlabel">Rząd '+(i+1)+' &nbsp;·&nbsp; pozycje '+r[0]+'–'+r[1]+'</div><div class="row">';
    for(var p=r[0];p<=r[1];p++){
      var pr=P[p]||{e:'',d:'poz.'+p};
      var on=(p===ap)?' on':'';
      h+='<div class="prod'+on+'" onclick="clk('+p+')"><div class="card"><div class="svg-wrap">'+icon(pr.d)+'</div><div class="info"><div class="bl">PHILIPS</div><div class="bd">'+pr.d+'</div><div class="bn">'+p+'</div></div></div><div class="ptag"></div></div>';
    }
    h+='</div><div class="plank"></div>';
  }
  document.getElementById('body').innerHTML=h;
}

function clk(p){
  ap=p; render();
  var pr=P[p]||{e:'',d:'poz.'+p};
  document.getElementById('res').className='res on';
  document.getElementById('rp').textContent=p;
  document.getElementById('rn').textContent=pr.d;
  document.getElementById('re').textContent=pr.e;
  var el=document.querySelector('.prod.on');
  if(el) el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
}

function search(){
  var s=document.getElementById('ean').value.trim();
  if(!s) return;
  var foundPos=null;
  for(var p in P){
    var e=P[p].e;
    if(e && e.slice(-s.length)===s){ foundPos=p; break; }
  }
  if(!foundPos){
    document.getElementById('res').className='res on';
    document.getElementById('rp').textContent='?';
    document.getElementById('rn').textContent='Nie znaleziono';
    document.getElementById('re').textContent='EAN: ...'+s;
    return;
  }
  clk(parseInt(foundPos));
}

document.getElementById('ean').addEventListener('keydown',function(e){if(e.key==='Enter')search();});
render();

// === ROZPOZNAWANIE GŁOSU ===
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var listening = false;
var restartTimer = null;

function toggleMic(){
  if(listening) stopMic(); else startMic();
}

function startMic(){
  if(!SR){ alert('Użyj Chrome na Androidzie'); return; }
  if(recognition){ try{ recognition.abort(); }catch(e){} }
  recognition = new SR();
  recognition.lang = 'pl-PL';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.onstart = function(){ listening = true; updateMicUI(true); };
  recognition.onresult = function(e){
    var interim = '', final = '';
    for(var i = e.resultIndex; i < e.results.length; i++){
      var t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t; else interim += t;
    }
    var raw = final || interim;
    var digits = spokenToDigits(raw);
    if(digits) document.getElementById('heardVal').textContent = '...' + digits;
    if(final && digits && digits.length >= 2){
      document.getElementById('ean').value = digits;
      search();
    }
  };
  recognition.onerror = function(e){
    if(e.error === 'not-allowed'){ stopMic(); alert('Zezwól na dostęp do mikrofonu!'); return; }
    scheduleRestart(300);
  };
  recognition.onend = function(){ if(listening) scheduleRestart(150); };
  try{ recognition.start(); }catch(e){ scheduleRestart(500); }
}

function stopMic(){
  listening = false;
  clearTimeout(restartTimer);
  try{ recognition && recognition.abort(); }catch(e){}
  updateMicUI(false);
}

function scheduleRestart(d){
  clearTimeout(restartTimer);
  if(listening) restartTimer = setTimeout(function(){ if(listening) startMic(); }, d);
}

function updateMicUI(on){
  document.getElementById('micDot').className = 'dot' + (on ? '' : ' off');
  document.getElementById('micBtn').className = 'mic-btn ' + (on ? 'listening' : 'stopped');
  document.getElementById('micLabel').textContent = on ? 'Zatrzymaj mikrofon' : 'Włącz mikrofon';
}

function spokenToDigits(text){
  var map = {'zero':'0','jeden':'1','jedna':'1','dwa':'2','dwie':'2','trzy':'3','cztery':'4','pięć':'5','piec':'5','sześć':'6','szesc':'6','siedem':'7','osiem':'8','dziewięć':'9','dziewiec':'9'};
  var result = '';
  var words = text.toLowerCase().trim().split(/\s+/);
  for(var i = 0; i < words.length; i++){
    var w = words[i];
    if(map[w]) result += map[w];
    else result += w.replace(/\D/g, '');
  }
  if(!result) result = text.replace(/\D/g, '');
  return result;
}
